<!DOCTYPE html>
<html>
    <head>
     <title>Rotating Square</title>
     <style>
            body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #151817;
            font-family: Arial, sans-serif;
            padding-top: 50px;
            }
            .square {
            width: 120px;
            height: 120px;
            background: #c91010cc;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(91, 89, 89, 0.813);
            animation: rotate 3s linear infinite;
            }
            @keyframes rotate {
            from {
            transform: rotate(0deg);
            }
            to {
            transform: rotate(360deg);
            }
            }
        </style>
    </head>
    <body>
        <h1 style="color: #ebdd4a;">Rotating Square</h1>
        <div class="square"></div>
    </body>
</html>

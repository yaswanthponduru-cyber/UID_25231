<!DOCTYPE html>
<html>
<head>
    <title>Electronics</title>
    <style>
        body {
            margin: 0;
            background-color: aliceblue;
            font-family: sans-serif;
        }

        
        .products {
            grid-area: products;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
        }
        img{
            width: 120px;
            height: auto;
            border-radius: 8px;
        }
        .p{
            text-align: center;
            background-color: tomato;
            align-items: center;
        }
        

        .button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 50px;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #7094ff;
        }
    </style>
</head>
<body>
        <div class="products">
            <div class="product-card">
                <img src="Shirt.png">
                <h3>shirt</h3>
                <p>$39</p>
                <p>Size: S , M , XL , XXL</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="t-shirt.png">
                <h3>T-Shirt</h3>
                <p>$59</p>
                <p>Size: S , M , L , XL</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="pants.png">
                <h3>pants</h3>
                <p>$49</p>
                <p>Size: 28 , 30 , 32 , 34</p>
                <button class="button">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="shorts.png">
                <h3>shorts</h3>
                <p>$52</p>
                <p>Size: 28 , 30 , 32 , 34</p>
                <button class="button">Add to Cart</button>
            </div>
        </div>
</body>

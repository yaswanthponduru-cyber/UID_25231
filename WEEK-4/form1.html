<!DOCTYPE html>
<html>
<head>
    <title>College Admission Registration</title>
</head>
<body bgcolor="#E6E6FA"> <table border="1" align="center" cellpadding="10" cellspacing="0" bgcolor="white">
        <tr>
            <th colspan="2">
                <h2>College Admission Registration</h2>
            </th>
        </tr>

        <form action="#" method="post">
            <tr>
                <td><label for="name">Full Name:</label></td>
                <td><input type="text" id="name" name="name"></td>
            </tr>

            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email"></td>
            </tr>

            <tr>
                <td><label for="phone">Phone Number:</label></td>
                <td><input type="tel" id="phone" name="phone"></td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </td>
            </tr>

            <tr>
                <td>Course Applying For:</td>
                <td>
                    <select name="course">
                        <option value="btech">B.Tech</option>
                        <option value="mtech">M.Tech</option>
                        <option value="bsc">B.Sc</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Hobbies:</td>
                <td>
                    <input type="checkbox" id="sports" name="hobbies" value="sports">
                    <label for="sports">Sports</label>
                    <input type="checkbox" id="music" name="hobbies" value="music">
                    <label for="music">Music</label>
                    <input type="checkbox" id="reading" name="hobbies" value="reading">
                    <label for="reading">Reading</label>
                </td>
            </tr>

            <tr>
                <td>Date of Birth:</td>
                <td><input type="date" name="dob"></td>
            </tr>

            <tr>
                <td>Upload Certificates:</td>
                <td><input type="file" name="certificates"></td>
            </tr>

            <tr>
                <td>Address:</td>
                <td>
                    <textarea name="address" rows="4" cols="30"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </form>
    </table>

</body>
</html>
<!DOCTYPE html>

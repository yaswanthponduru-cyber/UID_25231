<!DOCTYPE html>
<html>
<head>
    <title>Two Forms Using Iframes</title>
    <style>
        body {
            background-color: #e6e6e6;
            font-family: Arial, sans-serif;
        }

        .main {
            width: 900px;
            margin: 40px auto;
            background-color: #e8e5c8;
            padding: 30px;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        .frames {
            display: flex;
            justify-content: space-between;
        }

        iframe {
            width: 400px;
            height: 300px;
            border: 2px solid #a46b6b;
            background-color: #f5f5f5;
        }
    </style>
</head>

<body>

<div class="main">
    <h2>Two Forms Displayed Using Iframes</h2>

    <div class="frames">
        <iframe src="login.html"></iframe>
        <iframe src="register.html"></iframe>
    </div>
</div>

</body>
</html>
